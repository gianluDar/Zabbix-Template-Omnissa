              master_item:
                key: horizon.raw.saml_authenticators
              delay: '0'
              history: 7d
              trends: 90d
              value_type: FLOAT
              units: days
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'try{var d=JSON.parse(value),s=d.filter(function(x){return (x.name||x.id)==="{#SAML.NAME}";})[0];if(!s||!s.certificate||!s.certificate.valid_to)return -1;return Math.floor((s.certificate.valid_to-Date.now())/86400000);}catch(e){return -1;}'
