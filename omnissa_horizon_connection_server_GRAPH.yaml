zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 'a571c0d144b14fd4a87a9d9b2aa9fcd6'
      name: Templates/Virtualization
  templates:
    - uuid: 'f4c8d2e1a3b546e7890f1234567890ab'
      template: Omnissa Horizon Connection Server
      name: Omnissa Horizon Connection Server
      description: |
        Monitoraggio Omnissa Horizon 8 (2503+) - Horizon Server REST API.
        Endpoint monitorati (path reali da Swagger 2503):
          /monitor/v2/connection-servers    - CS status, sessioni, cert, replica
          /monitor/v4/virtual-centers       - vCenter status e cert
          /monitor/v4/ad-domains            - AD domain status
          /monitor/v5/gateways              - UAG status e connessioni
          /monitor/v4/saml-authenticators   - SAML auth status
          /monitor/v2/true-sso              - True SSO status
          /monitor/v2/farms                 - Farm health
          /monitor/v2/rds-servers           - RDS server status
          /monitor/v2/event-database        - Event DB status
          /monitor/v3/desktop-pools/metrics - Pool metrics (available, errors)
          /monitor/v1/health-metrics        - Health aggregata di tutti i componenti
          /monitor/v1/sessions/metrics      - Conteggio sessioni locali/remote
          /monitor/v1/licenses/usage-metrics- Utilizzo licenze
          /monitor/v1/machines/count-metrics- Conteggi macchine per stato
        MACRO: {$HORIZON.URL} {$HORIZON.DOMAIN} {$HORIZON.USER} {$HORIZON.PASSWORD}
      groups:
        - name: Templates/Virtualization
      macros:
        - macro: '{$HORIZON.URL}'
          value: 'https://horizon.example.com'
          description: 'Base URL CS. Accetta: https://IP, https://IP/rest, https://IP/rest/'
        - macro: '{$HORIZON.DOMAIN}'
          value: 'DOMAIN'
          description: 'NetBIOS short name dominio AD (es. CONTOSO non contoso.local)'
        - macro: '{$HORIZON.USER}'
          value: 'svc-zabbix'
          description: 'Username senza prefisso dominio (Read-only Administrators)'
        - macro: '{$HORIZON.PASSWORD}'
          value: ''
          type: SECRET_TEXT
          description: 'Password account di servizio'
        - macro: '{$HORIZON.CERT.EXPIRY.WARN}'
          value: '30'
          description: 'Warning scadenza certificato (giorni)'
        - macro: '{$HORIZON.CERT.EXPIRY.CRIT}'
          value: '7'
          description: 'Critico scadenza certificato (giorni)'
        - macro: '{$HORIZON.CONN.WARN.PCT}'
          value: '80'
          description: 'Warning utilizzo connection threshold per CS (%)'
        - macro: '{$HORIZON.SESSION.WARN}'
          value: '2000'
          description: 'Warning sessioni totali locali+remote'
        - macro: '{$HORIZON.LICENSE.WARN.PCT}'
          value: '80'
          description: 'Warning utilizzo licenze concurrent (%)'
        - macro: '{$HORIZON.LICENSE.CRIT.PCT}'
          value: '95'
          description: 'Critico utilizzo licenze concurrent (%)'
        - macro: '{$HORIZON.MACHINE.ERR.WARN}'
          value: '0'
          description: 'Warning macchine in errore (0 = alert al primo errore)'
        - macro: '{$HORIZON.LLD.POOL.FILTER}'
          value: '.*'
          description: 'Regex filtro pool per LLD'
        - macro: '{$HORIZON.LLD.RDS.FILTER}'
          value: '.*'
          description: 'Regex filtro RDS server per LLD'
      items:
        - uuid: '1a000001000040008000000000000001'
          name: 'Horizon: Connection Servers raw data'
          type: SCRIPT
          key: horizon.raw.connection_servers
          delay: 1m
          history: 1h
          trends: '0'
          value_type: TEXT
          description: 'GET /monitor/v2/connection-servers - status, sessioni, cert, replica'
          params: |
            function horizonApi(path, fallback) {
                var url = '{$HORIZON.URL}'.replace(/\/rest\/?$/, '').replace(/\/$/, '');
                var req = new HttpRequest();
                try { req.setSSLVerifyPeer(false); req.setSSLVerifyHost(false); } catch(e) {}
                req.addHeader('Content-Type: application/json');
                var lr = req.post(url + '/rest/login', JSON.stringify({domain:'{$HORIZON.DOMAIN}',username:'{$HORIZON.USER}',password:'{$HORIZON.PASSWORD}'}));
                if (req.getStatus() !== 200) throw 'Login failed: HTTP ' + req.getStatus() + ' => ' + lr;
                var auth = JSON.parse(lr);
                req.addHeader('Authorization: Bearer ' + auth.access_token);
                var resp = req.get(url + path);
                var sc = req.getStatus();
                try { req.post(url + '/rest/logout', JSON.stringify({refresh_token: auth.refresh_token})); } catch(e) {}
                if (sc === 404 && fallback !== undefined) return fallback;
                if (sc !== 200) throw 'API error: HTTP ' + sc + ' on ' + path;
                return resp;
            }
            return horizonApi('/rest/monitor/v2/connection-servers');
          tags:
            - tag: component
              value: connection-server
        - uuid: '1a000002000040008000000000000002'
