          params: |
            function horizonApi(path, fallback) {
                var url = '{$HORIZON.URL}'.replace(/\/rest\/?$/, '').replace(/\/$/, '');
                var req = new HttpRequest();
                try { req.setSSLVerifyPeer(false); req.setSSLVerifyHost(false); } catch(e) {}
                req.addHeader('Content-Type: application/json');
                var lr = req.post(url + '/rest/login', JSON.stringify({domain:'{$HORIZON.DOMAIN}',username:'{$HORIZON.USER}',password:'{$HORIZON.PASSWORD}'}));
                if (req.getStatus() !== 200) throw 'Login failed: HTTP ' + req.getStatus();
                var auth = JSON.parse(lr);
                req.addHeader('Authorization: Bearer ' + auth.access_token);
                var resp = req.get(url + path);
                var sc = req.getStatus();
                try { req.post(url + '/rest/logout', JSON.stringify({refresh_token: auth.refresh_token})); } catch(e) {}
                if (sc === 404 && fallback !== undefined) return fallback;
                if (sc !== 200) throw 'API error: HTTP ' + sc + ' on ' + path;
                return resp;
            }
            return horizonApi('/rest/monitor/v1/rds-servers/count-metrics', '{}');
          tags:
            - tag: component
              value: rds-server
